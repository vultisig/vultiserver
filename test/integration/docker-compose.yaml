services:
  redis-relay:
    image: redis:7-alpine
    command: redis-server --requirepass vultisig
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vultisig", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis-vs1:
    image: redis:7-alpine
    command: redis-server --requirepass vultisig
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vultisig", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  redis-vs2:
    image: redis:7-alpine
    command: redis-server --requirepass vultisig
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "vultisig", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/vultiserver --ignore-existing;
      exit 0;
      "
    restart: "no"

  relay:
    build:
      context: ../../../vultisig-relay
      dockerfile: Dockerfile
    depends_on:
      redis-relay:
        condition: service_healthy
    volumes:
      - ./relay-config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  vultiserver1:
    build:
      context: ../../..
      dockerfile: vultiserver/test/integration/Dockerfile
    depends_on:
      redis-vs1:
        condition: service_healthy
      relay:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      - VAULTS_PATH=/data/vaults
      - REDIS_HOST=redis-vs1
    volumes:
      - vaults1:/data/vaults

  vultiserver2:
    build:
      context: ../../..
      dockerfile: vultiserver/test/integration/Dockerfile
    depends_on:
      redis-vs2:
        condition: service_healthy
      relay:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      - VAULTS_PATH=/data/vaults
      - REDIS_HOST=redis-vs2
    volumes:
      - vaults2:/data/vaults

  orchestrator:
    build:
      context: ../../..
      dockerfile: vultiserver/test/integration/Dockerfile.orchestrator
    depends_on:
      vultiserver1:
        condition: service_started
      vultiserver2:
        condition: service_started
    environment:
      - RELAY_URL=http://relay:8080
      - SERVER1_URL=http://vultiserver1:8080
      - SERVER2_URL=http://vultiserver2:8080

volumes:
  vaults1:
  vaults2:
