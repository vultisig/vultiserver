# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Install Clang
      run: sudo apt-get install -y clang

    - name: Install dkls libraries
      run: |
        wget https://github.com/vultisig/go-wrappers/archive/refs/heads/master.tar.gz
        tar -xzf master.tar.gz
        cd go-wrappers-master
        sudo mkdir -p /usr/local/lib/dkls
        sudo cp --recursive includes /usr/local/lib/dkls

    - name: Install frost-zm libraries
      run: |
        GOPRIVATE=github.com/vultisig/* go mod download github.com/vultisig/frost-zm/go
        FROST_ZM_DIR="$(go list -m -f '{{.Dir}}' github.com/vultisig/frost-zm/go)"
        FROZT_DIR="$FROST_ZM_DIR/frozt/includes/linux-amd64"
        FROMT_DIR="$FROST_ZM_DIR/fromt/includes/linux-amd64"
        sudo mkdir -p /usr/local/lib/frost-zm
        sudo cp "$FROZT_DIR"/*.so /usr/local/lib/frost-zm/
        sudo cp "$FROMT_DIR"/*.so /usr/local/lib/frost-zm/
        ls -la /usr/local/lib/frost-zm/
      env:
        CGO_ENABLED: 1
        CC: clang
        GOPRIVATE: github.com/vultisig/*

    - name: Build
      run: go build -v ./...
      env:
        CGO_ENABLED: 1
        CC: clang

    - name: Test
      run: |
        export LD_LIBRARY_PATH=/usr/local/lib/dkls/includes/linux/:/usr/local/lib/frost-zm/:$LD_LIBRARY_PATH
        go test -v ./...
      env:
        CGO_ENABLED: 1
        CC: clang
